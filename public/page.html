<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-window-title">Tournament Lobby Center - 15BallPool</title>
    <style>
        body {
            margin: 0; padding: 0; background: #0c0c0c; color: #dddddd;
            font-family: system-ui, -apple-system, sans-serif; line-height: 1.6;
        }
        nav {
            background: #111; padding: 12px 30px; border-bottom: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box; height: 64px;
        }
        .web-logo-zone {
            display: flex; align-items: center; padding: 0; margin: 0; text-decoration: none;
        }
        .brand-png-logo {
            height: 38px; width: auto; display: block; object-fit: contain;
        }
        .back-btn { background: #00ffcc; color: #000; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        
        .content-wrapper { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #fff; border-bottom: 2px solid #00ffcc; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* 🏆 50 ROOMS GRID FRAMEWORK */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }
        .room-card {
            background: #161616;
            border: 1px solid #2b2b2b;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: border-color 0.2s;
        }
        .room-card:hover { border-color: #00ffcc; }
        .room-title { color: #fff; font-size: 1.15rem; font-weight: bold; margin: 0 0 5px 0; }
        .room-desc { color: #00ffcc; font-size: 0.8rem; text-transform: uppercase; font-weight: 700; margin-bottom: 15px; letter-spacing: 0.5px; }
        
        .action-slots { display: flex; gap: 10px; }
        .btn-join {
            flex: 1; padding: 10px 5px; font-weight: bold; font-size: 0.8rem; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; transition: 0.2s;
        }
        .btn-p1 { background: #00ffcc; color: #000; }
        .btn-p1:hover { background: #00ccaa; }
        .btn-p2 { background: #ffcc00; color: #000; }
        .btn-p2:hover { background: #e6b800; }

        footer { text-align: center; padding: 30px; border-top: 1px solid #222; color: #666; font-size: 0.85rem; margin-top: 60px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="web-logo-zone">
            <img src="logo.png" alt="15BallPool Logo" class="brand-png-logo">
        </a>
        <a href="index.html" class="back-btn">⬅️ Back to Home</a>
    </nav>

    <div class="content-wrapper" id="page-content-target">
        </div>

    <footer>
        &copy; 2026 15BallPool Inc. All Rights Reserved. Hosted via Hostinger structures.
    </footer>

    <script>
        const PAGES_DATABASE = {
            "privacy": {
                title: "Privacy Policy",
                html: `<h1>Privacy Policy</h1><p>Welcome to 15BallPool. We value your privacy and do not collect personal identifiers on machine configurations.</p>`
            },
            "terms": {
                title: "Terms of Service",
                html: `<h1>Terms of Service</h1><p>Usage framework and strict alignment conditions guidelines for 15BallPool simulation engine rules.</p>`
            },
            "contact": {
                title: "Contact Support",
                html: `<h1>Contact Support</h1><p>Reach our live technical assistance queue vectors anytime instantly.</p>`
            },
            "api": {
                title: "Developer API",
                html: `<h1>Developer API Documentation</h1><p>Integrate standard 15BallPool scoring variables metrics inside third-party clients loops.</p>`
            },
            "leaderboard": {
                title: "Global Leaderboard",
                html: `<h1>Elite Pro Leaderboard</h1><p>Top global master records ranking metrics calculated securely.</p>`
            },
            "how-to-play": {
                title: "How to Play",
                html: `<h1>How to Play 15BallPool</h1><p>Drag your cursor view matrix to aim the cue stick. Hold left click to charge trajectory line velocity vector vectors.</p>`
            },
            // 🏆 RE-ENGINEERED TOURNAMENT 50 ROOMS AUTOMATED COMPILER
            "tournaments": {
                title: "Official Pro Tournaments",
                html: `
                    <h1>🏆 Live Pro Tournament Rooms</h1>
                    <p style="color: #aaa; margin-bottom: 20px;">Select any active tournament room from the 50 operational slots below. Player 1 acts as Host and Player 2 acts as Guest. Coordinate with your opponent to join the same room number!</p>
                    <div class="rooms-grid" id="sql-rooms-grid-wrapper"></div>
                `
            }
        };

        function compileTournamentRoomsGrid() {
            let wrapperNode = document.getElementById('felt-color-options-wrapper'); // safe context marker
            let gridTarget = document.getElementById('rooms-state-injection-hook') || document.getElementById('game-wrapper');
            
            // Generate exact 50 operational tournament rooms grid loop matrices
            let container = document.getElementById('rooms-fallback-injector') || document.getElementById('page-content-target');
            let roomContainer = container.querySelector("#sql-rooms-grid-wrapper");
            
            if (roomContainer) {
                roomContainer.innerHTML = "";
                for (let i = 1; i <= 50; i++) {
                    let roomCard = document.createElement('div');
                    roomCard.className = 'room-card';
                    
                    roomCard.innerHTML = `
                        <div class="room-title">Tournament Room #${i}</div>
                        <div class="room-desc">15-Ball Slate Pro Match</div>
                        <div class="action-slots">
                            <a href="index.html?matchId=room_${1000 + i}&role=host" class="btn-join btn-p1">Join as P1</a>
                            <a href="index.html?matchId=room_${1000 + i}&role=guest" class="btn-join btn-p2">Join as P2</a>
                        </div>
                    `;
                    roomContainer.appendChild(roomCard);
                }
            }
        }

        function routeDynamicContent() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetPageKey = urlParams.get('view') || 'privacy';
            const pageData = PAGES_DATABASE[targetPageKey];

            if (pageData) {
                document.getElementById('page-content-target').innerHTML = pageData.html;
                document.title = pageData.title + " - 15BallPool";
                document.getElementById('page-window-title').innerText = pageData.title + " - 15BallPool";
                
                if (targetPageKey === 'tournaments') {
                    compileTournamentRoomsGrid();
                }
            }
        }

        window.onload = routeDynamicContent;
    </script>
</body>
</html>
