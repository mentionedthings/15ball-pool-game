<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>15BallPool Realtime Node Portal</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <nav id="main-web-header">
        <div class="header-container">
            <a href="/" class="web-logo-zone" style="text-decoration: none; color: inherit;">
                <img src="logo.png" alt="15BallPool Logo" class="brand-png-logo">
            </a>
            <ul class="header-menu-links">
                <li><a href="/" class="active">Home</a></li>
                <li><a href="page.html?view=tournaments">Tournaments</a></li>
                <li><a href="page.html?view=leaderboard">Leaderboard</a></li>
                <li><a href="page.html?view=how-to-play">How to Play</a></li>
            </ul>
        </div>
    </nav>

    <div id="game-wrapper">
        <header id="hud-overlay">
            <div id="player1-card" class="player-profile active">
                <div class="avatar">👤</div>
                <div class="meta">
                    <span class="username">Player 1</span>
                    <span id="p1-group" class="group-indicator text-muted">Open Table</span>
                    <div id="p1-rack" class="ball-pocketed-rack"></div>
                </div>
            </div>
            
            <div id="center-hud-display">
                <div id="status-msg">Click Play Button below to connect to server stream...</div>
                <div id="shot-timer-box">⏱️ <span id="timer-count">20</span>s</div>
            </div>
            
            <div id="player2-card" class="player-profile">
                <div class="meta">
                    <span id="p2-identity" class="username">Player 2</span>
                    <span id="p2-group" class="group-indicator text-muted">Open Table</span>
                    <div id="p2-rack" class="ball-pocketed-rack"></div>
                </div>
                <div class="avatar">👤</div>
            </div>
        </header>

        <div id="table-layout-container">
            <div id="power-rail-container">
                <div id="power-gradient-track"><div id="power-fill-bar"></div></div>
                <div id="power-handle"></div>
            </div>

            <div id="canvas-container" style="position: relative;">
                <div id="game-start-splash-screen" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(15, 15, 15, 0.85), rgba(5, 5, 5, 0.95)), url('logo.png') no-repeat center; background-size: contain; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px;">
                    <h2 style="color: #ffffff; margin: 0; font-size: 1.8rem; font-weight: 800;">Realtime Tournament Workspace Channel</h2>
                    <button onclick="launchPhaserGameEngineInstance()" style="padding: 16px 45px; background: #00ffcc; color: #000; font-size: 1.25rem; font-weight: 900; border: none; border-radius: 30px; cursor: pointer; text-transform: uppercase;">▶️ Connect & Play</button>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
